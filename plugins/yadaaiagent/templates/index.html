<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>AI Agent · YadaCoin</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #1a1d2e;
        --border: #2d3748;
        --accent: #a78bfa;
        --accent2: #c4b5fd;
        --muted: #718096;
        --text: #e2e8f0;
        --subtext: #94a3b8;
        --green: #22c55e;
        --green2: #4ade80;
        --red: #ef4444;
        --red2: #f87171;
        --user-bg: #2d1f63;
        --agent-bg: #14172a;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Top bar ── */
      header {
        flex-shrink: 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 {
        font-size: 1rem;
        font-weight: 700;
        color: var(--accent);
      }
      header .sub {
        font-size: 0.75rem;
        color: var(--muted);
      }
      #sessionPill {
        margin-left: auto;
        font-size: 0.72rem;
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--subtext);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 260px;
      }
      #sessionPill.ok {
        border-color: #16a34a;
        color: var(--green2);
      }
      #sessionPill.bad {
        border-color: #7f1d1d;
        color: var(--red2);
      }

      /* ── Chat pane ── */
      #chat {
        flex: 1 1 0;
        overflow-y: auto;
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      #chat::-webkit-scrollbar {
        width: 6px;
      }
      #chat::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      /* ── Message rows ── */
      .msg-row {
        display: flex;
        padding: 6px 20px;
        gap: 12px;
        align-items: flex-start;
      }
      .msg-row.user {
        flex-direction: row-reverse;
      }
      .msg-row.agent {
        flex-direction: row;
      }

      .avatar {
        flex-shrink: 0;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 700;
      }
      .user .avatar {
        background: #553c9a;
        color: var(--accent2);
      }
      .agent .avatar {
        background: #1e293b;
        color: var(--accent);
        border: 1px solid var(--border);
      }

      .bubble {
        max-width: 72%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 0.88rem;
        line-height: 1.55;
        word-break: break-word;
      }
      .user .bubble {
        background: var(--user-bg);
        color: var(--accent2);
        border-radius: 12px 2px 12px 12px;
      }
      .agent .bubble {
        background: var(--agent-bg);
        color: var(--text);
        border-radius: 2px 12px 12px 12px;
        border: 1px solid var(--border);
      }
      .bubble.thinking {
        color: var(--subtext);
        font-style: italic;
      }
      .bubble code {
        font-family:
          "SF Mono", Consolas, monospace;
        font-size: 0.82em;
        background: rgba(255, 255, 255, 0.06);
        padding: 1px 4px;
        border-radius: 3px;
      }
      .bubble pre {
        background: #0a0c12;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        font-size: 0.78rem;
        white-space: pre-wrap;
        word-break: break-all;
        margin-top: 8px;
        max-height: 260px;
        overflow: auto;
      }

      /* Step list inside a bubble */
      .steps {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .step {
        font-size: 0.78rem;
        color: var(--subtext);
        padding: 2px 0 2px 10px;
        border-left: 2px solid var(--border);
      }
      .step.done {
        color: var(--green2);
        border-color: #16a34a;
      }
      .step.fail {
        color: var(--red2);
        border-color: #dc2626;
      }

      /* ── Approval card (injected into chat) ── */
      .approval-card {
        background: var(--surface);
        border: 1px solid var(--accent);
        border-radius: 10px;
        padding: 14px 16px;
        margin-top: 10px;
        font-size: 0.85rem;
      }
      .approval-card .title {
        font-weight: 700;
        color: var(--accent);
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
      }
      .approval-card .detail {
        color: var(--subtext);
        font-size: 0.82rem;
        margin-bottom: 10px;
        line-height: 1.5;
      }
      .approval-card .sf-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }
      .approval-card input {
        flex: 1;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
        font-family:
          "SF Mono", Consolas, monospace;
        font-size: 0.82rem;
      }
      .approval-card input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .approval-card .btn-row {
        display: flex;
        gap: 8px;
      }
      .btn {
        border: none;
        border-radius: 6px;
        padding: 7px 16px;
        font-weight: 700;
        font-size: 0.82rem;
        cursor: pointer;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn.approve {
        background: var(--green);
        color: #0a0c12;
      }
      .btn.approve:hover:not(:disabled) {
        background: var(--green2);
      }
      .btn.deny {
        background: var(--red);
        color: #fff;
      }
      .btn.deny:hover:not(:disabled) {
        background: var(--red2);
      }

      /* ── Typing indicator ── */
      .typing {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 4px 2px;
      }
      .typing span {
        width: 7px;
        height: 7px;
        background: var(--subtext);
        border-radius: 50%;
        animation: bounce 1.2s infinite;
      }
      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.5;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      /* ── Bottom input bar ── */
      #inputBar {
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        background: var(--surface);
        padding: 12px 20px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      #userInput {
        flex: 1;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        font-family: inherit;
        font-size: 0.9rem;
        resize: none;
        min-height: 42px;
        max-height: 160px;
        overflow-y: auto;
        line-height: 1.4;
      }
      #userInput:focus {
        outline: none;
        border-color: var(--accent);
      }
      #sendBtn {
        flex-shrink: 0;
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: 8px;
        width: 42px;
        height: 42px;
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #sendBtn:hover:not(:disabled) {
        background: var(--accent2);
      }
      #sendBtn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── Settings gear button ── */
      #settingsBtn {
        background: none;
        border: 1px solid var(--border);
        color: var(--subtext);
        border-radius: 6px;
        width: 32px;
        height: 32px;
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      #settingsBtn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── Settings drawer ── */
      #settingsDrawer {
        display: none;
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 320px;
        background: var(--surface);
        border-left: 1px solid var(--border);
        z-index: 100;
        flex-direction: column;
        padding: 20px;
        gap: 14px;
        overflow-y: auto;
      }
      #settingsDrawer.open {
        display: flex;
      }
      #settingsDrawer h2 {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        flex-shrink: 0;
      }
      .setting-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .setting-group label {
        font-size: 0.75rem;
        color: var(--subtext);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .setting-group select,
      .setting-group input {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 0.84rem;
        font-family: inherit;
        width: 100%;
      }
      .setting-group select:focus,
      .setting-group input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .setting-group .hint {
        font-size: 0.72rem;
        color: var(--muted);
        line-height: 1.4;
      }
      #apiKeyRow {
        display: none;
      }
      #apiKeyRow.visible {
        display: flex;
      }
      #settingsSaveBtn {
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-weight: 700;
        font-size: 0.84rem;
        cursor: pointer;
        margin-top: 4px;
      }
      #settingsSaveBtn:hover {
        background: var(--accent2);
      }
      #settingsCloseBtn {
        background: none;
        border: 1px solid var(--border);
        color: var(--subtext);
        border-radius: 6px;
        padding: 8px 16px;
        font-size: 0.84rem;
        cursor: pointer;
      }
      #settingsCloseBtn:hover {
        border-color: var(--red);
        color: var(--red2);
      }
      #settingsSavedMsg {
        font-size: 0.78rem;
        color: var(--green2);
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>YadaCoin AI Agent</h1>
        <div class="sub">
          KEL-backed one-time credentials ·
          on-chain audit trail
        </div>
      </div>
      <div id="sessionPill">checking key…</div>
      <button
        id="settingsBtn"
        title="LLM settings"
      >
        ⚙
      </button>
    </header>

    <div id="settingsDrawer">
      <h2>LLM Settings</h2>

      <div class="setting-group">
        <label>Provider</label>
        <select id="llmProvider">
          <option value="ollama">
            Ollama (local)
          </option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">
            Anthropic
          </option>
          <option value="openai_compat">
            OpenAI-compatible (custom)
          </option>
        </select>
      </div>

      <div
        class="setting-group"
        id="ollamaHostRow"
      >
        <label>Ollama host</label>
        <input
          id="llmOllamaHost"
          type="text"
          placeholder="http://localhost:11434"
        />
      </div>

      <div
        class="setting-group"
        id="customBaseUrlRow"
        style="display: none"
      >
        <label>Base URL</label>
        <input
          id="llmBaseUrl"
          type="text"
          placeholder="https://api.example.com/v1"
        />
      </div>

      <div class="setting-group">
        <label>Model</label>
        <input
          id="llmModel"
          type="text"
          placeholder="e.g. llama3.2, gpt-4o, claude-3-5-sonnet-20241022"
        />
        <div class="hint" id="modelHint">
          Ollama: run <code>ollama list</code> to
          see available models.
        </div>
      </div>

      <div class="setting-group" id="apiKeyRow">
        <label>API Key</label>
        <input
          id="llmApiKey"
          type="password"
          placeholder="sk-…"
          autocomplete="off"
        />
        <div class="hint">
          Stored in localStorage — never sent to
          the YadaCoin server.
        </div>
      </div>

      <div
        style="
          display: flex;
          gap: 8px;
          flex-wrap: wrap;
        "
      >
        <button id="settingsSaveBtn">Save</button>
        <button id="settingsCloseBtn">
          Close
        </button>
        <span id="settingsSavedMsg">✓ Saved</span>
      </div>
    </div>

    <div id="chat"></div>

    <div id="inputBar">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Message the agent…"
      ></textarea>
      <button id="sendBtn" title="Send">
        &#10148;
      </button>
    </div>

    <script type="module">
      import * as secp from "https://esm.sh/@noble/secp256k1@2.1.0";
      import { sha256 } from "https://esm.sh/@noble/hashes@1.4.0/sha256";
      import { sha512 } from "https://esm.sh/@noble/hashes@1.4.0/sha512";
      import { hmac } from "https://esm.sh/@noble/hashes@1.4.0/hmac";

      // Required by @noble/secp256k1 v2 for synchronous signing
      secp.etc.hmacSha256Sync = (key, ...msgs) =>
        hmac(
          sha256,
          key,
          secp.etc.concatBytes(...msgs),
        );

      // ── hex helpers ──
      const hex = {
        toBytes(h) {
          h = h.trim().toLowerCase();
          if (h.length % 2)
            throw new Error("odd hex");
          const out = new Uint8Array(
            h.length / 2,
          );
          for (let i = 0; i < out.length; i++)
            out[i] = parseInt(
              h.substr(i * 2, 2),
              16,
            );
          return out;
        },
        fromBytes: (b) =>
          Array.from(b)
            .map((x) =>
              x.toString(16).padStart(2, "0"),
            )
            .join(""),
      };

      // ── DER-encode a secp256k1 signature from compact r||s bytes ──
      // coincurve's verify_signature always expects DER encoding.
      function compactSigToDerHex(sigObj) {
        // @noble/secp256k1 v2 Signature exposes r and s as BigInts
        function encInt(n) {
          let h = n.toString(16);
          if (h.length % 2) h = "0" + h;
          // prepend 0x00 if high bit set (to keep positive)
          if (parseInt(h.slice(0, 2), 16) >= 0x80)
            h = "00" + h;
          return h;
        }
        const r = encInt(sigObj.r);
        const s = encInt(sigObj.s);
        const rLen = (r.length / 2)
          .toString(16)
          .padStart(2, "0");
        const sLen = (s.length / 2)
          .toString(16)
          .padStart(2, "0");
        const seq =
          "02" + rLen + r + "02" + sLen + s;
        const seqLen = (seq.length / 2)
          .toString(16)
          .padStart(2, "0");
        const derHex = "30" + seqLen + seq;
        // Convert hex → base64 (standard base64-encoded DER, e.g. MEUCIQCGhW…)
        const bytes = new Uint8Array(
          derHex
            .match(/.{2}/g)
            .map((b) => parseInt(b, 16)),
        );
        return btoa(
          String.fromCharCode(...bytes),
        );
      }

      // ── derive_secure_path (matches keyrotation.py) ──
      const CURVE_ORDER = BigInt(
        "0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141",
      );
      const HARD_BIT = 0x80000000n;
      const INDEX_MOD = 2147483647n;

      function bytesToBigIntBE(b) {
        let v = 0n;
        for (const x of b)
          v = (v << 8n) | BigInt(x);
        return v;
      }
      function bigIntToBytesBE(v, len) {
        const out = new Uint8Array(len);
        for (let i = len - 1; i >= 0; i--) {
          out[i] = Number(v & 0xffn);
          v >>= 8n;
        }
        return out;
      }
      function deriveIndex(factor, level) {
        const d = new TextEncoder().encode(
          factor + String(level),
        );
        return Number(
          bytesToBigIntBE(sha256(d)) % INDEX_MOD,
        );
      }
      function bip32HardenedChild(
        parentPriv,
        parentCc,
        index,
      ) {
        const hi =
          (HARD_BIT + BigInt(index)) &
          0xffffffffn;
        const data = new Uint8Array(37);
        data[0] = 0x00;
        data.set(parentPriv, 1);
        data[33] = Number((hi >> 24n) & 0xffn);
        data[34] = Number((hi >> 16n) & 0xffn);
        data[35] = Number((hi >> 8n) & 0xffn);
        data[36] = Number(hi & 0xffn);
        const I = hmac(sha512, parentCc, data);
        const childInt =
          (bytesToBigIntBE(I.slice(0, 32)) +
            bytesToBigIntBE(parentPriv)) %
          CURVE_ORDER;
        return {
          priv: bigIntToBytesBE(childInt, 32),
          cc: I.slice(32, 64),
        };
      }
      function deriveSecurePath(
        privBytes,
        ccBytes,
        sf,
      ) {
        let cur = {
          priv: privBytes,
          cc: ccBytes,
        };
        for (let l = 0; l < 4; l++)
          cur = bip32HardenedChild(
            cur.priv,
            cur.cc,
            deriveIndex(sf, l),
          );
        return cur;
      }

      // ── localStorage keys ──
      const LS_PRIV = "yadacoin_derived_key";
      const LS_CC = "yadacoin_derived_cc";
      const LS_LLM_PROVIDER =
        "yadacoin_llm_provider";
      const LS_LLM_MODEL = "yadacoin_llm_model";
      const LS_LLM_API_KEY =
        "yadacoin_llm_api_key";
      const LS_LLM_OLLAMA_HOST =
        "yadacoin_llm_ollama_host";
      const LS_LLM_BASE_URL =
        "yadacoin_llm_base_url";

      // ── LLM settings helpers ──
      function getLlmSettings() {
        return {
          provider:
            localStorage.getItem(
              LS_LLM_PROVIDER,
            ) || "ollama",
          model:
            localStorage.getItem(LS_LLM_MODEL) ||
            "",
          api_key:
            localStorage.getItem(
              LS_LLM_API_KEY,
            ) || "",
          ollama_host:
            localStorage.getItem(
              LS_LLM_OLLAMA_HOST,
            ) || "",
          base_url:
            localStorage.getItem(
              LS_LLM_BASE_URL,
            ) || "",
        };
      }

      // ── Settings drawer logic ──
      const settingsBtn = document.getElementById(
        "settingsBtn",
      );
      const settingsDrawer =
        document.getElementById("settingsDrawer");
      const settingsSaveBtn =
        document.getElementById(
          "settingsSaveBtn",
        );
      const settingsCloseBtn =
        document.getElementById(
          "settingsCloseBtn",
        );
      const settingsSavedMsg =
        document.getElementById(
          "settingsSavedMsg",
        );
      const llmProvider = document.getElementById(
        "llmProvider",
      );
      const llmModel =
        document.getElementById("llmModel");
      const llmApiKey =
        document.getElementById("llmApiKey");
      const llmOllamaHost =
        document.getElementById("llmOllamaHost");
      const llmBaseUrl =
        document.getElementById("llmBaseUrl");
      const apiKeyRow =
        document.getElementById("apiKeyRow");
      const ollamaHostRow =
        document.getElementById("ollamaHostRow");
      const customBaseUrlRow =
        document.getElementById(
          "customBaseUrlRow",
        );
      const modelHint =
        document.getElementById("modelHint");

      const MODEL_HINTS = {
        ollama:
          "Ollama: run <code>ollama list</code> to see available models. Default: llama3.2",
        openai:
          "OpenAI models: gpt-4o, gpt-4o-mini, gpt-4-turbo, gpt-3.5-turbo",
        anthropic:
          "Anthropic models: claude-3-5-sonnet-20241022, claude-3-haiku-20240307",
        openai_compat:
          "Enter the model name your provider expects.",
      };

      function applyProviderUI(provider) {
        const needsKey = provider !== "ollama";
        const isOllama = provider === "ollama";
        const isCompat =
          provider === "openai_compat";
        apiKeyRow.classList.toggle(
          "visible",
          needsKey,
        );
        ollamaHostRow.style.display = isOllama
          ? ""
          : "none";
        customBaseUrlRow.style.display = isCompat
          ? ""
          : "none";
        modelHint.innerHTML =
          MODEL_HINTS[provider] || "";
      }

      // Populate fields from localStorage on open
      settingsBtn.addEventListener(
        "click",
        () => {
          const s = getLlmSettings();
          llmProvider.value = s.provider;
          llmModel.value = s.model;
          llmApiKey.value = s.api_key;
          llmOllamaHost.value = s.ollama_host;
          llmBaseUrl.value = s.base_url;
          applyProviderUI(s.provider);
          settingsDrawer.classList.add("open");
          settingsSavedMsg.style.display = "none";
        },
      );

      llmProvider.addEventListener(
        "change",
        () => {
          applyProviderUI(llmProvider.value);
        },
      );

      settingsSaveBtn.addEventListener(
        "click",
        () => {
          localStorage.setItem(
            LS_LLM_PROVIDER,
            llmProvider.value,
          );
          localStorage.setItem(
            LS_LLM_MODEL,
            llmModel.value.trim(),
          );
          // API key never leaves the browser — only sent in requests to /api/chat
          localStorage.setItem(
            LS_LLM_API_KEY,
            llmApiKey.value.trim(),
          );
          localStorage.setItem(
            LS_LLM_OLLAMA_HOST,
            llmOllamaHost.value.trim(),
          );
          localStorage.setItem(
            LS_LLM_BASE_URL,
            llmBaseUrl.value.trim(),
          );
          settingsSavedMsg.style.display =
            "inline";
          setTimeout(
            () =>
              (settingsSavedMsg.style.display =
                "none"),
            2000,
          );
        },
      );

      settingsCloseBtn.addEventListener(
        "click",
        () => {
          settingsDrawer.classList.remove("open");
        },
      );

      // ── DOM refs ──
      const chatEl =
        document.getElementById("chat");
      const userInput =
        document.getElementById("userInput");
      const sendBtn =
        document.getElementById("sendBtn");
      const sessionPill = document.getElementById(
        "sessionPill",
      );

      // ── Session check ──
      let operatorReady = false;
      (function checkSession() {
        const priv =
          localStorage.getItem(LS_PRIV);
        const cc = localStorage.getItem(LS_CC);
        if (!priv || !cc) {
          sessionPill.className = "bad";
          sessionPill.textContent =
            "⚠ No operator key — visit /key-rotation/derived-keys";
          sendBtn.disabled = true;
          appendAgent(
            "⚠ No operator key found in <code>localStorage</code>. " +
              'Please <a href="/key-rotation/derived-keys" target="_blank" style="color:var(--accent)">initialise your key</a> first, then reload.',
            false,
          );
          return;
        }
        try {
          const pub = hex.fromBytes(
            secp.getPublicKey(
              hex.toBytes(priv),
              true,
            ),
          );
          sessionPill.className = "ok";
          sessionPill.textContent =
            "🔓 " + pub.slice(0, 16) + "…";
          operatorReady = true;
          appendAgent(
            "Hello! I'm your YadaCoin AI agent. How can I help you today?",
          );
        } catch (e) {
          sessionPill.className = "bad";
          sessionPill.textContent =
            "Key parse error";
          sendBtn.disabled = true;
        }
      })();

      // ── Auto-grow textarea ──
      userInput.addEventListener("input", () => {
        userInput.style.height = "auto";
        userInput.style.height =
          Math.min(userInput.scrollHeight, 160) +
          "px";
      });
      userInput.addEventListener(
        "keydown",
        (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
          }
        },
      );
      sendBtn.addEventListener("click", send);

      // ── Chat helpers ──
      function scrollBottom() {
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function appendUser(text) {
        const row = document.createElement("div");
        row.className = "msg-row user";
        row.innerHTML = `
          <div class="avatar">You</div>
          <div class="bubble">${escHtml(text)}</div>`;
        chatEl.appendChild(row);
        scrollBottom();
        return row;
      }

      function appendAgent(html, isHtml = true) {
        const row = document.createElement("div");
        row.className = "msg-row agent";
        const bubble =
          document.createElement("div");
        bubble.className = "bubble";
        if (isHtml) bubble.innerHTML = html;
        else bubble.textContent = html;
        row.innerHTML = `<div class="avatar">AI</div>`;
        row.appendChild(bubble);
        chatEl.appendChild(row);
        scrollBottom();
        return bubble;
      }

      function appendThinking() {
        const row = document.createElement("div");
        row.className = "msg-row agent";
        row.innerHTML = `
          <div class="avatar">AI</div>
          <div class="bubble thinking">
            <div class="typing"><span></span><span></span><span></span></div>
          </div>`;
        chatEl.appendChild(row);
        scrollBottom();
        return row;
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // ── Travel conversation state ──
      let travel = null;
      // null       = no active request
      // { dest, checkin, checkout, services }  — collected so far
      let chatHistory = [];

      // ── Main send handler ──
      async function send() {
        const prompt = userInput.value.trim();
        if (!prompt || !operatorReady) return;

        userInput.value = "";
        userInput.style.height = "auto";
        sendBtn.disabled = true;

        appendUser(prompt);
        chatHistory.push({
          role: "user",
          content: prompt,
        });

        const thinkRow = appendThinking();

        let data;
        try {
          const llmCfg = getLlmSettings();
          const resp = await fetch(
            "/ai-agent-auth/api/chat",
            {
              method: "POST",
              headers: {
                "Content-Type":
                  "application/json",
              },
              body: JSON.stringify({
                messages: chatHistory,
                llm: {
                  provider: llmCfg.provider,
                  model:
                    llmCfg.model || undefined,
                  api_key:
                    llmCfg.api_key || undefined,
                  ollama_host:
                    llmCfg.ollama_host ||
                    undefined,
                  base_url:
                    llmCfg.base_url || undefined,
                },
              }),
            },
          );
          data = await resp.json();
          if (!resp.ok)
            throw new Error(
              data.error || resp.status,
            );
        } catch (e) {
          thinkRow.remove();
          appendAgent(
            `<span style="color:var(--red2)">⚠ Could not reach AI service: ${escHtml(String(e))}. ` +
              `Check your LLM settings (⚙ button) or make sure Ollama is running (<code>ollama serve</code>).</span>`,
          );
          sendBtn.disabled = false;
          chatHistory.pop(); // remove failed user message
          return;
        }
        thinkRow.remove();

        // Merge extracted fields into travel state
        if (data.extracted) {
          if (!travel) travel = {};
          for (const [k, v] of Object.entries(
            data.extracted,
          )) {
            if (v != null && v !== "")
              travel[k] = v;
          }
        }

        chatHistory.push({
          role: "assistant",
          content: data.reply,
        });

        if (
          data.complete &&
          travel?.dest &&
          travel?.checkin &&
          travel?.checkout &&
          travel?.services?.length
        ) {
          // All details collected — show summary + approval card
          const svcsHtml = travel.services
            .map(
              (s) =>
                `<strong>${escHtml(s)}</strong>`,
            )
            .join(", ");
          const bubble = appendAgent(
            escHtml(data.reply) +
              `<br><br>` +
              `📍 Destination: <strong>${escHtml(travel.dest)}</strong><br>` +
              `📅 Check-in: <strong>${escHtml(travel.checkin)}</strong><br>` +
              `📅 Check-out: <strong>${escHtml(travel.checkout)}</strong><br>` +
              `🛎 Services: ${svcsHtml}<br><br>` +
              `To proceed I'll broadcast a rotation transaction committing ` +
              `this scope on-chain as a W3C Verifiable Credential. ` +
              `Please enter your second factor to approve.`,
          );
          const card = buildApprovalCard(
            travel,
            bubble,
          );
          bubble.appendChild(card);
          scrollBottom();
        } else {
          appendAgent(data.reply);
          sendBtn.disabled = false;
        }
      }

      function sleep(ms) {
        return new Promise((r) =>
          setTimeout(r, ms),
        );
      }

      // ── Approval card builder ──
      function buildApprovalCard(
        travelDetails,
        bubble,
      ) {
        // Preview VC (displayed before approval — credentialSubject.id filled in
        // after the second factor is entered and the child key is derived)
        const previewVc = {
          "@context": [
            "https://www.w3.org/ns/credentials/v2",
            "https://yadacoin.io/contexts/agent-auth/v1",
          ],
          type: [
            "VerifiableCredential",
            "AgentAuthorizationCredential",
          ],
          issuer:
            "did:yadacoin:<operator_public_key>",
          validFrom: new Date().toISOString(),
          credentialStatus: {
            type: "YadaKELStatus",
            mode: "rotation",
          },
          credentialSubject: {
            id: "did:yadacoin:<agent_key_derived_on_approval>",
            agentAuthorization: {
              type: "TravelBookingAuthorization",
              destination: travelDetails.dest,
              checkin: travelDetails.checkin,
              checkout: travelDetails.checkout,
              services: travelDetails.services,
            },
          },
        };
        const previewJson = JSON.stringify(
          previewVc,
          null,
          2,
        );

        const card =
          document.createElement("div");
        card.className = "approval-card";
        card.innerHTML = `
          <div class="title">🔐 Authorisation Required</div>
          <div class="detail">
            The following W3C Verifiable Credential will be committed on-chain
            in the <code>relationship</code> field of the rotation transaction.
            The <code>credentialSubject.id</code> is filled in with the derived
            agent key after you enter your second factor.
            <pre style="margin-top:8px;font-size:0.76rem;max-height:140px;overflow:auto">${escHtml(previewJson)}</pre>
          </div>
          <div class="sf-row">
            <input type="password" class="sf-input" placeholder="Second factor (password)" autocomplete="current-password" />
          </div>
          <div class="btn-row">
            <button class="btn approve ap-btn">✓ Approve &amp; Book</button>
            <button class="btn deny dn-btn">✗ Deny</button>
          </div>`;

        const sfInput =
          card.querySelector(".sf-input");
        const apBtn =
          card.querySelector(".ap-btn");
        const dnBtn =
          card.querySelector(".dn-btn");

        // Auto-focus the second-factor field and submit on Enter
        setTimeout(() => sfInput.focus(), 50);
        sfInput.addEventListener(
          "keydown",
          (e) => {
            if (
              e.key === "Enter" &&
              !apBtn.disabled
            )
              apBtn.click();
          },
        );

        dnBtn.addEventListener("click", () => {
          card.remove();
          bubble.innerHTML += `<hr style="border-color:var(--border);margin:8px 0;">
            <span style="color:var(--red2);font-size:0.82rem;">✗ Action denied by operator.</span>`;
          travel = null;
          chatHistory = [];
          sendBtn.disabled = false;
          userInput.focus();
          scrollBottom();
        });

        apBtn.addEventListener(
          "click",
          async () => {
            const sf = sfInput.value;
            if (!sf) {
              sfInput.style.borderColor =
                "var(--red)";
              sfInput.focus();
              return;
            }

            apBtn.disabled = true;
            dnBtn.disabled = true;
            sfInput.disabled = true;
            card.remove();

            const stepsBubble = appendAgent("");
            const stepsDiv =
              document.createElement("div");
            stepsDiv.className = "steps";
            stepsBubble.appendChild(stepsDiv);

            function addStep(text, klass = "") {
              const d =
                document.createElement("div");
              d.className = "step " + klass;
              d.textContent = "› " + text;
              stepsDiv.appendChild(d);
              scrollBottom();
              return d;
            }

            try {
              const storedPriv =
                localStorage.getItem(LS_PRIV);
              const storedCC =
                localStorage.getItem(LS_CC);
              if (!storedPriv || !storedCC)
                throw new Error(
                  "operator key missing from localStorage",
                );

              // ── Step 1: Derive child key client-side ──
              const s1 = addStep(
                "Deriving pre-committed key from operator key…",
              );
              const child = deriveSecurePath(
                hex.toBytes(storedPriv),
                hex.toBytes(storedCC),
                sf,
              );
              const childPubHex = hex.fromBytes(
                secp.getPublicKey(
                  child.priv,
                  true,
                ),
              );

              // Derive the agent key (K_{n+3} = grandchild of child)
              // so we can embed did:yadacoin:<agentPubHex> in the VC
              const _gc1 = deriveSecurePath(
                child.priv,
                child.cc,
                sf,
              );
              const _gc2 = deriveSecurePath(
                _gc1.priv,
                _gc1.cc,
                sf,
              );
              const agentPubHex = hex.fromBytes(
                secp.getPublicKey(
                  _gc2.priv,
                  true,
                ),
              );
              const operatorPubHex =
                hex.fromBytes(
                  secp.getPublicKey(
                    hex.toBytes(storedPriv),
                    true,
                  ),
                );

              // Build the W3C VC 2.0 that will be committed on-chain
              const vc = {
                "@context": [
                  "https://www.w3.org/ns/credentials/v2",
                  "https://yadacoin.io/contexts/agent-auth/v1",
                ],
                type: [
                  "VerifiableCredential",
                  "AgentAuthorizationCredential",
                ],
                issuer: `did:yadacoin:${operatorPubHex}`,
                validFrom:
                  new Date().toISOString(),
                credentialStatus: {
                  type: "YadaKELStatus",
                  mode: "rotation",
                },
                credentialSubject: {
                  id: `did:yadacoin:${agentPubHex}`,
                  agentAuthorization: {
                    type: "TravelBookingAuthorization",
                    destination:
                      travelDetails.dest,
                    checkin:
                      travelDetails.checkin,
                    checkout:
                      travelDetails.checkout,
                    services:
                      travelDetails.services,
                  },
                },
              };
              const relationshipB64 = btoa(
                unescape(
                  encodeURIComponent(
                    JSON.stringify(vc),
                  ),
                ),
              );

              s1.classList.add("done");
              s1.textContent =
                "› Pre-committed key derived: " +
                childPubHex.slice(0, 20) +
                "…";

              // ── Step 2: Broadcast rotation txn with scope committed on-chain ──
              const s2 = addStep(
                "Broadcasting rotation transaction with booking scope on-chain…",
              );
              const rotateRes = await fetch(
                "/key-rotation/derived-child-key",
                {
                  method: "POST",
                  headers: {
                    "Content-Type":
                      "application/json",
                  },
                  body: JSON.stringify({
                    public_key: childPubHex,
                    second_factor: sf,
                    signature: "",
                    relationship: relationshipB64,
                  }),
                },
              );
              const rotateData =
                await rotateRes.json();
              if (
                !rotateRes.ok ||
                !rotateData.status ||
                !rotateData.prerotated_private_key
              ) {
                s2.classList.add("fail");
                s2.textContent =
                  "› Rotation failed: " +
                  (rotateData.message ||
                    rotateRes.status);
                appendAgent(
                  `<span style="color:var(--red2)">I wasn't able to obtain a credential. ` +
                    `Please check your second factor and try again.</span>`,
                );
                travel = null;
                chatHistory = [];
                sendBtn.disabled = false;
                userInput.focus();
                return;
              }
              s2.classList.add("done");
              s2.textContent =
                "› Scope committed · txid " +
                rotateData.transaction_id.slice(
                  0,
                  20,
                ) +
                "…";

              // Update localStorage so next call derives from the rotated key
              localStorage.setItem(
                LS_PRIV,
                rotateData.prev_private_key,
              );
              if (rotateData.prev_chain_code)
                localStorage.setItem(
                  LS_CC,
                  rotateData.prev_chain_code,
                );

              // ── Step 3: Build VP wrapping the on-chain VC ──
              const provPrivBytes = hex.toBytes(
                rotateData.prerotated_private_key,
              );
              const provPubHex = hex.fromBytes(
                secp.getPublicKey(
                  provPrivBytes,
                  true,
                ),
              );

              const s3 = addStep(
                "Building Verifiable Presentation wrapping on-chain VC…",
              );

              // VP base without proof — holder presents the VC issued on-chain
              const vpBase = {
                "@context": [
                  "https://www.w3.org/ns/credentials/v2",
                ],
                type: ["VerifiablePresentation"],
                holder: `did:yadacoin:${provPubHex}`,
                verifiableCredential: [vc],
              };

              // Deep-sort all keys recursively so the canonical form matches
              // json.dumps(..., sort_keys=True) on the server side.
              // NOTE: JSON.stringify(obj, arrayReplacer) filters nested objects
              // to only include keys in the array — do NOT use that approach.
              function deepSortKeys(obj) {
                if (Array.isArray(obj))
                  return obj.map(deepSortKeys);
                if (
                  obj !== null &&
                  typeof obj === "object"
                ) {
                  const sorted = {};
                  Object.keys(obj)
                    .sort()
                    .forEach(
                      (k) =>
                        (sorted[k] = deepSortKeys(
                          obj[k],
                        )),
                    );
                  return sorted;
                }
                return obj;
              }

              // Canonical bytes (sorted keys, no whitespace) — used in proof
              const vpCanonical = JSON.stringify(
                deepSortKeys(vpBase),
              );
              const vpCanonicalBytes =
                new TextEncoder().encode(
                  vpCanonical,
                );

              s3.classList.add("done");
              s3.textContent = `› VP built · holder did:yadacoin:${provPubHex.slice(0, 16)}…`;

              // ── Steps 4+: Authenticate with each vendor independently ──
              // Each vendor issues its own challenge and verifies the VP proof.
              const vendorResults = [];
              for (const service of travelDetails.services) {
                // 4a. Request challenge from this vendor
                const sChallenge = addStep(
                  `[${service}] Requesting challenge from vendor…`,
                );
                const chalRes = await fetch(
                  `/ai-agent-auth/api/vendor/${service}/challenge?public_key=${encodeURIComponent(provPubHex)}`,
                );
                const chalData =
                  await chalRes.json();
                if (
                  !chalRes.ok ||
                  !chalData.challenge
                ) {
                  sChallenge.classList.add(
                    "fail",
                  );
                  sChallenge.textContent = `› [${service}] Failed to get challenge`;
                  vendorResults.push({
                    service,
                    status: "error",
                    message:
                      "challenge request failed",
                  });
                  continue;
                }
                sChallenge.classList.add("done");
                sChallenge.textContent = `› [${service}] Challenge: ${chalData.challenge.slice(0, 12)}… (expires in ${chalData.expires_in}s)`;

                // 4b. Sign VP: SHA256(challenge_bytes + canonical_vp_sans_proof_bytes)
                //     This binds the signature to both the challenge and the VP content.
                const sSign = addStep(
                  `[${service}] Signing VP with agent key (private key stays in browser)…`,
                );
                const challengeBytes =
                  new TextEncoder().encode(
                    chalData.challenge,
                  );
                const msgBytes = new Uint8Array(
                  challengeBytes.length +
                    vpCanonicalBytes.length,
                );
                msgBytes.set(challengeBytes);
                msgBytes.set(
                  vpCanonicalBytes,
                  challengeBytes.length,
                );
                const msgHash = sha256(msgBytes);
                const sigObj = secp.sign(
                  msgHash,
                  provPrivBytes,
                );
                const proofValue =
                  compactSigToDerHex(sigObj);
                sSign.classList.add("done");
                sSign.textContent = `› [${service}] VP signed · sig ${proofValue.slice(0, 12)}…`;

                // Build full VP with proof
                const vp = {
                  ...vpBase,
                  proof: {
                    type: "EcdsaSecp256k1Signature2019",
                    challenge: chalData.challenge,
                    created:
                      new Date().toISOString(),
                    proofPurpose:
                      "authentication",
                    verificationMethod: `did:yadacoin:${provPubHex}#keys-1`,
                    proofValue,
                  },
                };

                // 4c. Present VP to vendor
                const sBook = addStep(
                  `[${service}] Presenting VP to vendor…`,
                );
                const bookRes = await fetch(
                  `/ai-agent-auth/api/vendor/${service}`,
                  {
                    method: "POST",
                    headers: {
                      "Content-Type":
                        "application/json",
                    },
                    body: JSON.stringify({
                      public_key: provPubHex,
                      challenge:
                        chalData.challenge,
                      vp,
                    }),
                  },
                );
                const bookData =
                  await bookRes.json();

                if (bookRes.status === 200) {
                  sBook.classList.add("done");
                  sBook.textContent = `› [${service}] Booked by ${escHtml(bookData.vendor)} · ${escHtml(bookData.confirmation)}`;
                  vendorResults.push({
                    service,
                    status: "ok",
                    confirmation:
                      bookData.confirmation,
                    vendor: bookData.vendor,
                  });
                } else {
                  sBook.classList.add("fail");
                  sBook.textContent = `› [${service}] ${bookRes.status}: ${bookData.message || "failed"}`;
                  vendorResults.push({
                    service,
                    status: "error",
                    message:
                      bookData.message ||
                      String(bookRes.status),
                  });
                }
              }

              // ── Final summary ──
              const allOk = vendorResults.every(
                (r) => r.status === "ok",
              );
              const anyOk = vendorResults.some(
                (r) => r.status === "ok",
              );
              const resultLines = vendorResults
                .map((r) =>
                  r.status === "ok"
                    ? `✓ <strong>${escHtml(r.service)}</strong> (${escHtml(r.vendor)}): <code>${escHtml(r.confirmation)}</code>`
                    : `✗ <strong>${escHtml(r.service)}</strong>: <span style="color:var(--red2)">${escHtml(r.message)}</span>`,
                )
                .join("<br>");

              if (allOk) {
                appendAgent(
                  `✅ <strong>All services booked!</strong><br><br>` +
                    `${resultLines}<br><br>` +
                    `Scope committed on-chain: <code>${rotateData.transaction_id.slice(0, 24)}…</code><br>` +
                    `<span style="color:var(--muted);font-size:0.8rem">Each vendor independently verified your VP against the KEL</span>`,
                );
              } else if (anyOk) {
                appendAgent(
                  `⚠️ <strong>Partial success</strong><br><br>` +
                    `${resultLines}<br><br>` +
                    `Scope committed on-chain: <code>${rotateData.transaction_id.slice(0, 24)}…</code>`,
                );
              } else {
                appendAgent(
                  `❌ <strong>All bookings failed</strong><br><br>${resultLines}`,
                );
              }

              // Refresh session pill with rotated operator key
              try {
                const newPub = hex.fromBytes(
                  secp.getPublicKey(
                    hex.toBytes(
                      rotateData.prev_private_key,
                    ),
                    true,
                  ),
                );
                sessionPill.textContent =
                  "🔓 " +
                  newPub.slice(0, 16) +
                  "…";
              } catch (_) {}
            } catch (e) {
              addStep(
                "Error: " + e.message,
                "fail",
              );
              appendAgent(
                `<span style="color:var(--red2)">Unexpected error: ${escHtml(String(e))}</span>`,
              );
            } finally {
              travel = null;
              chatHistory = [];
              sendBtn.disabled = false;
              userInput.focus();
            }
          },
        );

        return card;
      }
    </script>
  </body>
</html>
