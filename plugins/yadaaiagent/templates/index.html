<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>AI Agent · YadaCoin</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #1a1d2e;
        --border: #2d3748;
        --accent: #a78bfa;
        --accent2: #c4b5fd;
        --muted: #718096;
        --text: #e2e8f0;
        --subtext: #94a3b8;
        --green: #22c55e;
        --green2: #4ade80;
        --red: #ef4444;
        --red2: #f87171;
        --user-bg: #2d1f63;
        --agent-bg: #14172a;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Top bar ── */
      header {
        flex-shrink: 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 {
        font-size: 1rem;
        font-weight: 700;
        color: var(--accent);
      }
      header .sub {
        font-size: 0.75rem;
        color: var(--muted);
      }
      #sessionPill {
        margin-left: auto;
        font-size: 0.72rem;
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--subtext);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 260px;
      }
      #sessionPill.ok {
        border-color: #16a34a;
        color: var(--green2);
      }
      #sessionPill.bad {
        border-color: #7f1d1d;
        color: var(--red2);
      }

      /* ── Chat pane ── */
      #chat {
        flex: 1 1 0;
        overflow-y: auto;
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      #chat::-webkit-scrollbar {
        width: 6px;
      }
      #chat::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      /* ── Message rows ── */
      .msg-row {
        display: flex;
        padding: 6px 20px;
        gap: 12px;
        align-items: flex-start;
      }
      .msg-row.user {
        flex-direction: row-reverse;
      }
      .msg-row.agent {
        flex-direction: row;
      }

      .avatar {
        flex-shrink: 0;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 700;
      }
      .user .avatar {
        background: #553c9a;
        color: var(--accent2);
      }
      .agent .avatar {
        background: #1e293b;
        color: var(--accent);
        border: 1px solid var(--border);
      }

      .bubble {
        max-width: 72%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 0.88rem;
        line-height: 1.55;
        word-break: break-word;
      }
      .user .bubble {
        background: var(--user-bg);
        color: var(--accent2);
        border-radius: 12px 2px 12px 12px;
      }
      .agent .bubble {
        background: var(--agent-bg);
        color: var(--text);
        border-radius: 2px 12px 12px 12px;
        border: 1px solid var(--border);
      }
      .bubble.thinking {
        color: var(--subtext);
        font-style: italic;
      }
      .bubble code {
        font-family:
          "SF Mono", Consolas, monospace;
        font-size: 0.82em;
        background: rgba(255, 255, 255, 0.06);
        padding: 1px 4px;
        border-radius: 3px;
      }
      .bubble pre {
        background: #0a0c12;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        font-size: 0.78rem;
        white-space: pre-wrap;
        word-break: break-all;
        margin-top: 8px;
        max-height: 260px;
        overflow: auto;
      }

      /* Step list inside a bubble */
      .steps {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .step {
        font-size: 0.78rem;
        color: var(--subtext);
        padding: 2px 0 2px 10px;
        border-left: 2px solid var(--border);
      }
      .step.done {
        color: var(--green2);
        border-color: #16a34a;
      }
      .step.fail {
        color: var(--red2);
        border-color: #dc2626;
      }

      /* ── Approval card (injected into chat) ── */
      .approval-card {
        background: var(--surface);
        border: 1px solid var(--accent);
        border-radius: 10px;
        padding: 14px 16px;
        margin-top: 10px;
        font-size: 0.85rem;
      }
      .approval-card .title {
        font-weight: 700;
        color: var(--accent);
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
      }
      .approval-card .detail {
        color: var(--subtext);
        font-size: 0.82rem;
        margin-bottom: 10px;
        line-height: 1.5;
      }
      .approval-card .sf-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }
      .approval-card input {
        flex: 1;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
        font-family:
          "SF Mono", Consolas, monospace;
        font-size: 0.82rem;
      }
      .approval-card input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .approval-card .btn-row {
        display: flex;
        gap: 8px;
      }
      .btn {
        border: none;
        border-radius: 6px;
        padding: 7px 16px;
        font-weight: 700;
        font-size: 0.82rem;
        cursor: pointer;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn.approve {
        background: var(--green);
        color: #0a0c12;
      }
      .btn.approve:hover:not(:disabled) {
        background: var(--green2);
      }
      .btn.deny {
        background: var(--red);
        color: #fff;
      }
      .btn.deny:hover:not(:disabled) {
        background: var(--red2);
      }

      /* ── Typing indicator ── */
      .typing {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 4px 2px;
      }
      .typing span {
        width: 7px;
        height: 7px;
        background: var(--subtext);
        border-radius: 50%;
        animation: bounce 1.2s infinite;
      }
      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.5;
        }
        40% {
          transform: translateY(-5px);
          opacity: 1;
        }
      }

      /* ── Bottom input bar ── */
      #inputBar {
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        background: var(--surface);
        padding: 12px 20px;
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }
      #userInput {
        flex: 1;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        font-family: inherit;
        font-size: 0.9rem;
        resize: none;
        min-height: 42px;
        max-height: 160px;
        overflow-y: auto;
        line-height: 1.4;
      }
      #userInput:focus {
        outline: none;
        border-color: var(--accent);
      }
      #sendBtn {
        flex-shrink: 0;
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: 8px;
        width: 42px;
        height: 42px;
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #sendBtn:hover:not(:disabled) {
        background: var(--accent2);
      }
      #sendBtn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>YadaCoin AI Agent</h1>
        <div class="sub">
          KEL-backed one-time credentials ·
          on-chain audit trail
        </div>
      </div>
      <div id="sessionPill">checking key…</div>
    </header>

    <div id="chat"></div>

    <div id="inputBar">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Message the agent…"
      ></textarea>
      <button id="sendBtn" title="Send">
        &#10148;
      </button>
    </div>

    <script type="module">
      import * as secp from "https://esm.sh/@noble/secp256k1@2.1.0";
      import { sha256 } from "https://esm.sh/@noble/hashes@1.4.0/sha256";
      import { sha512 } from "https://esm.sh/@noble/hashes@1.4.0/sha512";
      import { hmac } from "https://esm.sh/@noble/hashes@1.4.0/hmac";

      // ── hex helpers ──
      const hex = {
        toBytes(h) {
          h = h.trim().toLowerCase();
          if (h.length % 2)
            throw new Error("odd hex");
          const out = new Uint8Array(
            h.length / 2,
          );
          for (let i = 0; i < out.length; i++)
            out[i] = parseInt(
              h.substr(i * 2, 2),
              16,
            );
          return out;
        },
        fromBytes: (b) =>
          Array.from(b)
            .map((x) =>
              x.toString(16).padStart(2, "0"),
            )
            .join(""),
      };

      // ── derive_secure_path (matches keyrotation.py) ──
      const CURVE_ORDER = BigInt(
        "0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141",
      );
      const HARD_BIT = 0x80000000n;
      const INDEX_MOD = 2147483647n;

      function bytesToBigIntBE(b) {
        let v = 0n;
        for (const x of b)
          v = (v << 8n) | BigInt(x);
        return v;
      }
      function bigIntToBytesBE(v, len) {
        const out = new Uint8Array(len);
        for (let i = len - 1; i >= 0; i--) {
          out[i] = Number(v & 0xffn);
          v >>= 8n;
        }
        return out;
      }
      function deriveIndex(factor, level) {
        const d = new TextEncoder().encode(
          factor + String(level),
        );
        return Number(
          bytesToBigIntBE(sha256(d)) % INDEX_MOD,
        );
      }
      function bip32HardenedChild(
        parentPriv,
        parentCc,
        index,
      ) {
        const hi =
          (HARD_BIT + BigInt(index)) &
          0xffffffffn;
        const data = new Uint8Array(37);
        data[0] = 0x00;
        data.set(parentPriv, 1);
        data[33] = Number((hi >> 24n) & 0xffn);
        data[34] = Number((hi >> 16n) & 0xffn);
        data[35] = Number((hi >> 8n) & 0xffn);
        data[36] = Number(hi & 0xffn);
        const I = hmac(sha512, parentCc, data);
        const childInt =
          (bytesToBigIntBE(I.slice(0, 32)) +
            bytesToBigIntBE(parentPriv)) %
          CURVE_ORDER;
        return {
          priv: bigIntToBytesBE(childInt, 32),
          cc: I.slice(32, 64),
        };
      }
      function deriveSecurePath(
        privBytes,
        ccBytes,
        sf,
      ) {
        let cur = {
          priv: privBytes,
          cc: ccBytes,
        };
        for (let l = 0; l < 4; l++)
          cur = bip32HardenedChild(
            cur.priv,
            cur.cc,
            deriveIndex(sf, l),
          );
        return cur;
      }

      // ── localStorage keys ──
      const LS_PRIV = "yadacoin_derived_key";
      const LS_CC = "yadacoin_derived_cc";

      // ── DOM refs ──
      const chatEl =
        document.getElementById("chat");
      const userInput =
        document.getElementById("userInput");
      const sendBtn =
        document.getElementById("sendBtn");
      const sessionPill = document.getElementById(
        "sessionPill",
      );

      // ── Session check ──
      let operatorReady = false;
      (function checkSession() {
        const priv =
          localStorage.getItem(LS_PRIV);
        const cc = localStorage.getItem(LS_CC);
        if (!priv || !cc) {
          sessionPill.className = "bad";
          sessionPill.textContent =
            "⚠ No operator key — visit /key-rotation/derived-keys";
          sendBtn.disabled = true;
          appendAgent(
            "⚠ No operator key found in <code>localStorage</code>. " +
              'Please <a href="/key-rotation/derived-keys" target="_blank" style="color:var(--accent)">initialise your key</a> first, then reload.',
            false,
          );
          return;
        }
        try {
          const pub = hex.fromBytes(
            secp.getPublicKey(
              hex.toBytes(priv),
              true,
            ),
          );
          sessionPill.className = "ok";
          sessionPill.textContent =
            "🔓 " + pub.slice(0, 16) + "…";
          operatorReady = true;
          appendAgent(
            "Hello! I'm your YadaCoin AI agent. How can I help you today?",
          );
        } catch (e) {
          sessionPill.className = "bad";
          sessionPill.textContent =
            "Key parse error";
          sendBtn.disabled = true;
        }
      })();

      // ── Auto-grow textarea ──
      userInput.addEventListener("input", () => {
        userInput.style.height = "auto";
        userInput.style.height =
          Math.min(userInput.scrollHeight, 160) +
          "px";
      });
      userInput.addEventListener(
        "keydown",
        (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
          }
        },
      );
      sendBtn.addEventListener("click", send);

      // ── Chat helpers ──
      function scrollBottom() {
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function appendUser(text) {
        const row = document.createElement("div");
        row.className = "msg-row user";
        row.innerHTML = `
          <div class="avatar">You</div>
          <div class="bubble">${escHtml(text)}</div>`;
        chatEl.appendChild(row);
        scrollBottom();
        return row;
      }

      function appendAgent(html, isHtml = true) {
        const row = document.createElement("div");
        row.className = "msg-row agent";
        const bubble =
          document.createElement("div");
        bubble.className = "bubble";
        if (isHtml) bubble.innerHTML = html;
        else bubble.textContent = html;
        row.innerHTML = `<div class="avatar">AI</div>`;
        row.appendChild(bubble);
        chatEl.appendChild(row);
        scrollBottom();
        return bubble;
      }

      function appendThinking() {
        const row = document.createElement("div");
        row.className = "msg-row agent";
        row.innerHTML = `
          <div class="avatar">AI</div>
          <div class="bubble thinking">
            <div class="typing"><span></span><span></span><span></span></div>
          </div>`;
        chatEl.appendChild(row);
        scrollBottom();
        return row;
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // ── Main send handler ──
      async function send() {
        const prompt = userInput.value.trim();
        if (!prompt || !operatorReady) return;

        userInput.value = "";
        userInput.style.height = "auto";
        sendBtn.disabled = true;

        appendUser(prompt);

        // Simulate agent "thinking"
        const thinkRow = appendThinking();
        await sleep(900 + Math.random() * 600);
        thinkRow.remove();

        // Agent decides it needs privileged access
        const bubble = appendAgent(
          `I can help with: <em>"${escHtml(prompt)}"</em>.<br><br>` +
            `To carry this out I need to act on your behalf using a one-time on-chain credential. ` +
            `Please enter your <strong>second factor</strong> and approve below.`,
        );

        // Inject approval card into the bubble
        const card = buildApprovalCard(
          prompt,
          bubble,
        );
        bubble.appendChild(card);
        scrollBottom();
      }

      function sleep(ms) {
        return new Promise((r) =>
          setTimeout(r, ms),
        );
      }

      // ── Approval card builder ──
      function buildApprovalCard(prompt, bubble) {
        const card =
          document.createElement("div");
        card.className = "approval-card";
        card.innerHTML = `
          <div class="title">🔐 Authorisation Required</div>
          <div class="detail">
            A rotation transaction will be broadcast with the prompt committed
            on-chain in the <code>relationship</code> field. The agent will
            receive a one-time private key valid only for this action.
          </div>
          <div class="sf-row">
            <input type="password" class="sf-input" placeholder="Second factor (password)" autocomplete="current-password" />
          </div>
          <div class="btn-row">
            <button class="btn approve ap-btn">✓ Approve</button>
            <button class="btn deny dn-btn">✗ Deny</button>
          </div>`;

        const sfInput =
          card.querySelector(".sf-input");
        const apBtn =
          card.querySelector(".ap-btn");
        const dnBtn =
          card.querySelector(".dn-btn");

        dnBtn.addEventListener("click", () => {
          card.remove();
          bubble.innerHTML += `<hr style="border-color:var(--border);margin:8px 0;">
            <span style="color:var(--red2);font-size:0.82rem;">✗ Action denied by operator.</span>`;
          sendBtn.disabled = false;
          scrollBottom();
        });

        apBtn.addEventListener(
          "click",
          async () => {
            const sf = sfInput.value;
            if (!sf) {
              sfInput.style.borderColor =
                "var(--red)";
              sfInput.focus();
              return;
            }

            apBtn.disabled = true;
            dnBtn.disabled = true;
            sfInput.disabled = true;
            card.remove();

            // Steps bubble
            const stepsBubble = appendAgent("");
            const stepsDiv =
              document.createElement("div");
            stepsDiv.className = "steps";
            stepsBubble.appendChild(stepsDiv);

            function addStep(text, klass = "") {
              const d =
                document.createElement("div");
              d.className = "step " + klass;
              d.textContent = "› " + text;
              stepsDiv.appendChild(d);
              scrollBottom();
              return d;
            }

            try {
              const storedPriv =
                localStorage.getItem(LS_PRIV);
              const storedCC =
                localStorage.getItem(LS_CC);
              if (!storedPriv || !storedCC)
                throw new Error(
                  "operator key missing from localStorage",
                );

              // 1. Derive child key
              const s1 = addStep(
                "Deriving pre-committed key from operator key…",
              );
              const child = deriveSecurePath(
                hex.toBytes(storedPriv),
                hex.toBytes(storedCC),
                sf,
              );
              const childPubHex = hex.fromBytes(
                secp.getPublicKey(
                  child.priv,
                  true,
                ),
              );
              s1.classList.add("done");
              s1.textContent =
                "› Pre-committed key derived: " +
                childPubHex.slice(0, 20) +
                "…";

              // 2. POST derived-child-key
              const s2 = addStep(
                "Broadcasting rotation transaction with prompt on-chain…",
              );
              const rotateRes = await fetch(
                "/key-rotation/derived-child-key",
                {
                  method: "POST",
                  headers: {
                    "Content-Type":
                      "application/json",
                  },
                  body: JSON.stringify({
                    public_key: childPubHex,
                    second_factor: sf,
                    signature: "",
                    relationship: btoa(
                      unescape(
                        encodeURIComponent(
                          prompt,
                        ),
                      ),
                    ),
                  }),
                },
              );
              const rotateData =
                await rotateRes.json();
              if (
                !rotateRes.ok ||
                !rotateData.status ||
                !rotateData.prerotated_private_key
              ) {
                s2.classList.add("fail");
                s2.textContent =
                  "› Rotation failed: " +
                  (rotateData.message ||
                    rotateRes.status);
                appendAgent(
                  `<span style="color:var(--red2)">I wasn't able to obtain a credential. Please check your second factor and try again.</span>`,
                );
                sendBtn.disabled = false;
                return;
              }
              s2.classList.add("done");
              s2.textContent =
                "› Rotation broadcast · txid " +
                rotateData.transaction_id.slice(
                  0,
                  20,
                ) +
                "…";

              // Update localStorage for next call
              localStorage.setItem(
                LS_PRIV,
                rotateData.prev_private_key,
              );
              if (rotateData.prev_chain_code)
                localStorage.setItem(
                  LS_CC,
                  rotateData.prev_chain_code,
                );

              // 3. POST action
              const s3 = addStep(
                "Submitting one-time credential to action endpoint…",
              );
              const privHex =
                rotateData.prerotated_private_key;
              const payload = JSON.stringify({
                tool: "fetch_account_summary",
                prompt,
                public_key:
                  rotateData.prerotated_public_key,
                nonce: crypto.randomUUID(),
                ts: Math.floor(Date.now() / 1000),
              });
              const actionRes = await fetch(
                "/ai-agent-auth/api/action",
                {
                  method: "POST",
                  headers: {
                    "Content-Type":
                      "application/json",
                  },
                  body: JSON.stringify({
                    private_key: privHex,
                    payload,
                    prompt,
                  }),
                },
              );
              const actionData =
                await actionRes.json();
              if (
                actionRes.ok &&
                actionData.status
              ) {
                s3.classList.add("done");
                s3.textContent =
                  "› Authorised · address " +
                  rotateData.prerotated_address.slice(
                    0,
                    16,
                  ) +
                  "…";
              } else {
                s3.classList.add("fail");
                s3.textContent =
                  "› Action rejected (" +
                  actionRes.status +
                  "): " +
                  (actionData.message || "");
              }

              // Final agent reply
              const ok =
                actionRes.ok && actionData.status;
              appendAgent(
                ok
                  ? `✅ Done. I've completed the action for: <em>"${escHtml(prompt)}"</em><br>` +
                      `The authorisation transaction is on-chain at <code>${rotateData.transaction_id.slice(0, 24)}…</code>.`
                  : `❌ The action could not be completed. The server responded: <em>${escHtml(actionData.message || String(actionRes.status))}</em>`,
              );

              // Refresh session pill with new key
              try {
                const newPub = hex.fromBytes(
                  secp.getPublicKey(
                    hex.toBytes(
                      rotateData.prev_private_key,
                    ),
                    true,
                  ),
                );
                sessionPill.textContent =
                  "🔓 " +
                  newPub.slice(0, 16) +
                  "…";
              } catch (_) {}
            } catch (e) {
              addStep(
                "Error: " + e.message,
                "fail",
              );
              appendAgent(
                `<span style="color:var(--red2)">Unexpected error: ${escHtml(String(e))}</span>`,
              );
            } finally {
              sendBtn.disabled = false;
            }
          },
        );

        return card;
      }
    </script>
  </body>
</html>
