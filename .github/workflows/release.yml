name: Create Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: echo "version=$(head -1 VERSION)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YadaCoin ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}

            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for changes.
          draft: false
          prerelease: false
