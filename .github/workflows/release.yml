name: Test and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-changes:
    name: Detect what changed
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.diff.outputs.code_changed }}
      docker_changed: ${{ steps.diff.outputs.docker_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes vs previous tag
        id: diff
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — treating everything as changed"
            echo "code_changed=true" >> $GITHUB_OUTPUT
            echo "docker_changed=true" >> $GITHUB_OUTPUT
          else
            echo "Comparing $PREV_TAG → ${{ github.ref_name }}"

            CODE=$(git diff --name-only "$PREV_TAG" "${{ github.ref_name }}" -- yadacoin/ tests/)
            if [ -n "$CODE" ]; then
              echo "code_changed=true" >> $GITHUB_OUTPUT
            else
              echo "No code changes — skipping tests"
              echo "code_changed=false" >> $GITHUB_OUTPUT
            fi

            DOCKER=$(git diff --name-only "$PREV_TAG" "${{ github.ref_name }}" -- Dockerfile requirements.txt 'plugins/*/requirements.txt')
            if [ -n "$DOCKER" ]; then
              echo "docker_changed=true" >> $GITHUB_OUTPUT
            else
              echo "No Docker-relevant changes — skipping image build"
              echo "docker_changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  test:
    name: Run tests
    needs: check-changes
    if: needs.check-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-22.04
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.1.2 mongomock pytest-cov

      - name: Run unit tests with pytest
        run: pytest tests/unittests/core --cov=yadacoin.core --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=100

  release:
    name: Build and publish release
    needs: [check-changes, test]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.name }}
    steps:
      - name: Set tag name
        id: tag
        run: echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Read VERSION file
        id: version
        run: echo "version=$(head -1 VERSION)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: needs.check-changes.outputs.docker_changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: needs.check-changes.outputs.docker_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: needs.check-changes.outputs.docker_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: needs.check-changes.outputs.docker_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.name }}
            ghcr.io/${{ github.repository }}:latest

      - name: Skip Docker build notice
        if: needs.check-changes.outputs.docker_changed != 'true'
        run: echo "Docker image unchanged since previous tag — skipping build and push"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: YadaCoin ${{ steps.tag.outputs.name }}
          body: |
            Release ${{ steps.tag.outputs.name }}

            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.name }}) for changes.
          draft: false
          prerelease: false

  windows:
    name: Build and release Windows
    needs: release
    if: always() && needs.release.result == 'success'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.7"

      - name: Install 7-Zip
        run: choco install 7zip -y

      - name: Install dependencies
        run: |
          grep -vE "pyrx|yadacoin-agent-auth|sendgrid|mixpanel|ua_parser|twilio|centeridentity|python-jose|openai|resend|discord\.py|PyGithub|web3|eth_account|eth_abi|stripe" requirements.txt > filtered_requirements.txt
          python -m pip install --upgrade pip
          pip install -r filtered_requirements.txt
          pip install pyinstaller pytest==7.4.4

      - name: Build with PyInstaller
        run: |
          python -c "from distutils.sysconfig import get_python_lib; print(get_python_lib())" > site_packages_path.txt
          pyinstaller yadacoin/app.spec

      - name: Zip the contents of dist directory
        run: |
          cd dist
          7z a ../yadacoin-windows.zip ./*

      - name: Add additional file to the zip
        run: |
          move winlibs/pyrx.cp37-win_amd64.pyd YadaCoin/
          move VERSION YadaCoin/
          move MIN_VERSION YadaCoin/
          7z u yadacoin-windows.zip ./YadaCoin/
          rm -r YadaCoin/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: yadacoin-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
