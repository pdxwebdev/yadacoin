name: Create Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify-kel:
    name: KEL signer verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Determine base ref for tag
        id: base_ref
        run: |
          # Use the tag's parent commit as the base so we only check commits
          # that are new in this release.
          BASE=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "base=${BASE}" >> $GITHUB_OUTPUT

      - name: Verify commit signers against KEL
        run: |
          python scripts/verify_kel_signers.py \
            "${{ steps.base_ref.outputs.base }}" \
            "${{ github.ref_name }}"

  release:
    name: Build and publish release
    needs: verify-kel
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: version
        run: echo "version=$(head -1 VERSION)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YadaCoin ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}

            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for changes.
          draft: false
          prerelease: false
