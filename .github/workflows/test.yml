name: Tests

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.1.2 mongomock pytest-cov

      - name: Run unit tests with pytest
        run: pytest tests/unittests --cov=yadacoin.core --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=100
