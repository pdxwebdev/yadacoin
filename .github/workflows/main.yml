name: Build and Release Windows

on:
  workflow_run:
    workflows: ["Create Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Set tag name
        id: tag
        run: echo "name=${{ github.event.workflow_run.head_branch || github.ref_name }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.7"

      - name: Install 7-Zip
        run: choco install 7zip -y

      - name: Install dependencies
        run: |
          grep -vE "pyrx|yadacoin-agent-auth|sendgrid|mixpanel|ua_parser|twilio|centeridentity|python-jose|openai|resend|discord\.py|PyGithub|validators|web3|eth_account|eth_abi|stripe" requirements.txt > filtered_requirements.txt
          python -m pip install --upgrade pip
          pip install -r filtered_requirements.txt
          pip install pyinstaller pytest==7.4.4

      - name: Build with PyInstaller
        run: |
          python -c "from distutils.sysconfig import get_python_lib; print(get_python_lib())" > site_packages_path.txt
          pyinstaller yadacoin/app.spec # or use the .spec file if you have one

      - name: Zip the contents of dist directory
        run: |
          cd dist
          7z a ../yadacoin-windows.zip ./*

      - name: Add additional file to the zip
        run: |
          move winlibs/pyrx.cp37-win_amd64.pyd YadaCoin/
          move VERSION YadaCoin/
          move MIN_VERSION YadaCoin/
          7z u yadacoin-windows.zip ./YadaCoin/
          rm -r YadaCoin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yadacoin-windows.zip
          path: yadacoin-windows.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: yadacoin-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
